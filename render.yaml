databases:
  - name: alumni-connect-db
    databaseName: alumniconnect
    user: alumniuser
    plan: free

services:
  - type: web
    name: alumni-connect
    env: php
    plan: free
    buildCommand: "./build.sh"
    startCommand: "apache2-foreground"
    envVars:
      - key: APP_NAME
        value: "Alumni Connect"
      - key: APP_ENV
        value: "production"
      # Set this in the Render dashboard to a value from `php artisan key:generate --show`
      # (format: base64:...). build.sh generates a temporary one if this is unset.
      - key: APP_KEY
        sync: false
      - key: APP_DEBUG
        value: "false"
      # NOTE: update this to the real Render URL once the service URL is known.
      - key: APP_URL
        value: "https://alumni-connect.onrender.com"
      - key: LOG_CHANNEL
        value: "stderr"
      - key: LOG_LEVEL
        value: "info"
      # sessions/cache tables are migrated; Postgres persists across the free
      # instance's ephemeral-disk restarts, so DB drivers are the robust choice.
      - key: SESSION_DRIVER
        value: "database"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: CACHE_STORE
        value: "database"
      - key: QUEUE_CONNECTION
        value: "sync"
      # Mail: set the secret values in the Render dashboard (sync: false).
      - key: MAIL_MAILER
        value: "smtp"
      - key: MAIL_HOST
        value: "smtp.gmail.com"
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_ENCRYPTION
        value: "tls"
      - key: MAIL_FROM_ADDRESS
        value: "hello@alumniconnect.com"
      - key: MAIL_FROM_NAME
        value: "Alumni Connect"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      # OAuth (Socialite): set client id/secret in the Render dashboard.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: "https://alumni-connect.onrender.com/auth/google/callback"
      - key: DB_CONNECTION
        value: "pgsql"
      - key: DB_HOST
        fromDatabase:
          name: alumni-connect-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: alumni-connect-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: alumni-connect-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: alumni-connect-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: alumni-connect-db
          property: password
