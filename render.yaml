databases:
  - name: alumni-connect-db
    databaseName: alumniconnect
    user: alumniuser
    plan: free

services:
  - type: web
    name: alumni-connect
    env: php
    plan: free
    buildCommand: "./build.sh"
    startCommand: "apache2-foreground"
    envVars:
      - key: APP_NAME
        value: "Alumni Connect"
      - key: APP_ENV
        value: "production"
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: "pgsql"
      - key: DB_HOST
        fromDatabase:
          name: alumni-connect-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: alumni-connect-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: alumni-connect-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: alumni-connect-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: alumni-connect-db
          property: password
